services:
  db:
    image: postgres:16
    container_name: expense-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: expense_tracker_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: expense-api
    restart: always
    ports:
      - "2000:2000"
      - "5555:5555"
    depends_on:
      - db
    env_file:
      - .env

volumes:
  db_data:
